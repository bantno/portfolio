# GitHub Actions workflow to deploy an Astro site to GitHub Pages.
#
# ── HOW TO CONFIGURE ────────────────────────────────────────────────────
#
# 1. In your repo settings → Pages → Source, select "GitHub Actions".
#
# 2. Set the `base` path in astro.config.mjs to match your repo name:
#      site: "https://<username>.github.io"
#      base: "/GCS"               ← your repo name
#
# 3. Push to the `main` branch. This workflow runs automatically.
#
# ────────────────────────────────────────────────────────────────────────

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
